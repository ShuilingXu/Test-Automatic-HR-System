# Local Docker coturn configuration used by docker-compose.coturn.yml.
# For public Ubuntu deployment, deploy-ubuntu.sh writes /etc/turnserver.conf
# with TURN_HOST/TURN_PRIVATE_IP from .env or auto-detection.
listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0
external-ip=192.168.3.2/172.18.0.2
fingerprint
lt-cred-mech
user=autohr:autohr-local-turn-secret
realm=autohr.local
min-port=49160
max-port=49200
no-cli
no-tlsv1
no-tlsv1_1
no-multicast-peers
allow-loopback-peers
allowed-peer-ip=127.0.0.1-127.255.255.255
allowed-peer-ip=172.16.0.0-172.31.255.255
allowed-peer-ip=192.168.0.0-192.168.255.255
allowed-peer-ip=198.18.0.0-198.19.255.255
verbose
log-binding
simple-log
new-log-timestamp
log-file=/dev/stdout
