server:
  port: 8080

spring:
  application:
    name: auto-hr-system
  profiles:
    active: dev
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:autohr.db
    username:
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.autohr.modules.**.entity
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: YOUR_SECRET_KEY_HERE
  expiration: 86400000
  header: Authorization
