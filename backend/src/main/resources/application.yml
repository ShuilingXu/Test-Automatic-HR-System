server:
  port: 8080

spring:
  application:
    name: auto-hr-system
  profiles:
    active: dev
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:autohr.db
    username:
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.autohr.modules.**.entity
  global-config:
    db-config:
      id-type: input

jwt:
  secret: AUTOHR_SYSTEM_SECRET_KEY_2026_SECURE_TOKEN_1234567890
  expiration: 86400000
  header: Authorization
