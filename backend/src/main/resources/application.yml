server:
  port: 8080

spring:
  application:
    name: auto-hr-system
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:autohr.db
    username:
    password:
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.autohr.modules.**.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: YOUR_SECRET_KEY_HERE
  expiration: 86400000
  header: Authorization
