server:
  port: 8080

spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
  application:
    name: auto-hr-system
  profiles:
    active: dev
  sql:
    init:
      mode: never
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.autohr.modules.**.entity
  global-config:
    db-config:
      id-type: input

jwt:
  secret: ${JWT_SECRET:AUTOHR_DEMO_JWT_SECRET_2026_LOCAL_ONLY_1234567890}
  expiration: ${JWT_EXPIRATION:86400000}
  header: Authorization

interview:
  llm:
    debug: false

app:
  database:
    type: ${DB_TYPE:sqlite}
    url: ${DB_URL:}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    sqlite-fallback-url: ${SQLITE_FALLBACK_URL:jdbc:sqlite:autohr.db}
  migration:
    enabled: ${MIGRATION_ENABLED:true}
